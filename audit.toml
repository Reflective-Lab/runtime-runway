[advisories]
# Advisories ignored by `cargo audit`. Each entry documents the upgrade path
# that would let us remove it.

ignore = [
    # rustls-webpki 0.102.x CVEs — pulled in by tonic 0.11 via
    # opentelemetry-otlp 0.16. opentelemetry-otlp is at 0.32; runway-telemetry
    # tracks 0.16. Removing these requires upgrading the otel exporter, which
    # is a separate workstream tracked elsewhere.
    "RUSTSEC-2026-0049", # CRLs not authoritative by Distribution Point
    "RUSTSEC-2026-0098", # Name constraints for URI names incorrectly accepted
    "RUSTSEC-2026-0099", # Name constraints accepted for wildcard certs
    "RUSTSEC-2026-0104", # Reachable panic in CRL parsing

    # Unmaintained transitive deps. None have a direct-dep upgrade path that
    # fixes them; they wait on their upstream parents (burn, tokenizers,
    # ratatui, tonic/opentelemetry) to migrate.
    "RUSTSEC-2021-0141", # dotenv (transitive; use dotenvy if we touch it)
    "RUSTSEC-2024-0436", # paste (heavily used by burn ecosystem)
    "RUSTSEC-2025-0119", # number_prefix (via ratatui/indicatif)
    "RUSTSEC-2025-0134", # rustls-pemfile (via tonic; same otel upgrade unblocks)
    "RUSTSEC-2025-0141", # bincode 1.x/2.x unmaintained
    "RUSTSEC-2026-0002", # lru IterMut unsoundness (via ratatui/burn-train)
]
