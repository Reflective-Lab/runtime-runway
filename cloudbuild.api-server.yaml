steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/Dockerfile.api-server'
      - '-t'
      - '$_IMAGE_URI'
      - '.'
    timeout: 1200s

images:
  - '$_IMAGE_URI'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
