services:
  converge-runtime:
    build:
      context: ${CONVERGE_ROOT:-../../converge}
      dockerfile: ${RUNWAY_DOCKERFILE:-../runway/docker/Dockerfile}
      args:
        CONVERGE_RUNTIME_FEATURES: "${CONVERGE_RUNTIME_FEATURES:-gcp,auth,firebase}"
    image: converge-runtime:dev
    container_name: converge-runtime
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      RUST_LOG: "${RUST_LOG:-info}"
      LOCAL_DEV: "${LOCAL_DEV:-true}"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID:-local-project}"
      GOOGLE_CLOUD_PROJECT: "${GOOGLE_CLOUD_PROJECT:-local-project}"
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID:-local-project}"
      FIREBASE_AUTH_EMULATOR_HOST: "${FIREBASE_AUTH_EMULATOR_HOST:-}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  nats:
    image: nats:2.10-alpine
    profiles: ["extras"]
    ports:
      - "4222:4222"

  surrealdb:
    image: surrealdb/surrealdb:latest
    profiles: ["extras"]
    command: ["start", "--log", "info", "--user", "root", "--pass", "root", "memory"]
    ports:
      - "8000:8000"

  ollama:
    image: ollama/ollama:latest
    profiles: ["llm"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      # Pick any tag that `ollama pull` supports, e.g. qwen2.5:32b-instruct, qwen2.5-coder:32b, qwen2.5:14b-instruct
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:14b-instruct}"
      OLLAMA_HOST: "0.0.0.0:11434"
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - |
        ollama serve &
        for i in $(seq 1 60); do
          ollama list >/dev/null 2>&1 && break
          sleep 0.2
        done
        ollama pull "$${OLLAMA_MODEL}"
        wait

volumes:
  ollama:
