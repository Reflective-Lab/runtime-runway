services:
  firestore:
    image: google/cloud-sdk:latest
    command: >
      gcloud beta emulators firestore start
      --host-port=0.0.0.0:8080
      --project=runway-contract
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080"]
      interval: 2s
      timeout: 2s
      retries: 15

  pubsub:
    image: google/cloud-sdk:latest
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=runway-contract
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8085"]
      interval: 2s
      timeout: 2s
      retries: 15

  gcs:
    image: fsouza/fake-gcs-server:latest
    command: >
      -scheme http
      -host 0.0.0.0
      -port 4443
      -public-host localhost:4443
      -external-url http://localhost:4443
    ports:
      - "4443:4443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:4443/storage/v1/b || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 15
