name: Question
description: Ask a question about using Runway
title: "[Question]: "
labels: ["question", "triage"]
assignees: ""
body:
  - type: markdown
    attributes:
      value: "Thank you for your interest in Runway! Please ask your question below."
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Please be as detailed as possible
      placeholder: How do I...?
    validations:
      required: true
  - type: dropdown
    id: question-type
    attributes:
      label: What type of question is this?
      options:
        - Deployment
        - Configuration
        - GPU/Inference
        - Docker
        - Building
        - Architecture
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Runway are you using?
      placeholder: 3.4.0
  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: What Rust version are you using?
      placeholder: 1.94.0
  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      placeholder: macOS, Linux, Windows
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other information that might help answer your question
