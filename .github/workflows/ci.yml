name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.0"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout commerce-rails (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: Reflective-Lab/commerce-rails
          token: ${{ secrets.COMMERCE_RAILS_TOKEN }}
          path: _commerce-rails
      - name: Place commerce-rails at runway's sibling path
        run: mv _commerce-rails "$GITHUB_WORKSPACE/../commerce-rails"
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Check workspace
        run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Checkout commerce-rails (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: Reflective-Lab/commerce-rails
          token: ${{ secrets.COMMERCE_RAILS_TOKEN }}
          path: _commerce-rails
      - name: Place commerce-rails at runway's sibling path
        run: mv _commerce-rails "$GITHUB_WORKSPACE/../commerce-rails"
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-targets

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Checkout commerce-rails (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: Reflective-Lab/commerce-rails
          token: ${{ secrets.COMMERCE_RAILS_TOKEN }}
          path: _commerce-rails
      - name: Place commerce-rails at runway's sibling path
        run: mv _commerce-rails "$GITHUB_WORKSPACE/../commerce-rails"
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout commerce-rails (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: Reflective-Lab/commerce-rails
          token: ${{ secrets.COMMERCE_RAILS_TOKEN }}
          path: _commerce-rails
      - name: Place commerce-rails at runway's sibling path
        run: mv _commerce-rails "$GITHUB_WORKSPACE/../commerce-rails"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
