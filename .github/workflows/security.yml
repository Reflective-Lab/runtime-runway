name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout commerce-rails (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: Reflective-Lab/commerce-rails
          token: ${{ secrets.COMMERCE_RAILS_TOKEN }}
          path: _commerce-rails
      - name: Place commerce-rails at runway's sibling path
        run: mv _commerce-rails "$GITHUB_WORKSPACE/../commerce-rails"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo-audit (blocking)
        run: cargo audit --deny warnings

  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --verbose --exit-code 1
